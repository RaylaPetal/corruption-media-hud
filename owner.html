<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Owner</title>
<style>
  :root{
    --bg:#070710; --panel:#0d0d18; --panel2:#10101e;
    --stroke:rgba(140,110,210,0.18); --pur:#9a6cff; --pur-bright:#b98cff;
    --txt:#e9e6f5; --muted:#7d7a93; --track:#1b1b2c;
    --grad:linear-gradient(90deg,#6a3df0,#a96bff 60%,#c79bff); --done:#56d18a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden}
  body{background:var(--bg);font-family:"Segoe UI",Roboto,Arial,sans-serif;color:var(--txt)}
  /* Authored wide (longer than tall); fitHud stretches it to fill the prim face. */
  .wrap{position:absolute;top:0;left:0;width:1000px;transform-origin:0 0;container-type:inline-size;padding:2cqw}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--stroke);border-radius:1.4cqw;padding:2cqw 2.2cqw}
  .top{display:flex;align-items:center;gap:1.4cqw}
  .heart{font-size:3.2cqw}
  .who{flex:1;min-width:0}
  .who .k{font-size:1.1cqw;letter-spacing:.2cqw;color:var(--muted);text-transform:uppercase}
  .who .n{font-size:2.8cqw;font-weight:800;color:#fff;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .close{font-size:1.3cqw;color:var(--pur-bright);border:1px solid var(--stroke);
    border-radius:.9cqw;padding:.7cqw 1.2cqw;cursor:pointer;user-select:none;white-space:nowrap}
  .sub{font-size:1.2cqw;letter-spacing:.18cqw;color:var(--muted);text-transform:uppercase;
    margin:1.4cqw 0 1cqw;border-top:1px solid var(--stroke);padding-top:1.1cqw}
  .tasks{display:flex;gap:1.4cqw;flex-wrap:wrap}
  .task{flex:1 1 40%;min-width:30cqw;background:rgba(255,255,255,.02);
    border:1px solid var(--stroke);border-radius:1.1cqw;padding:1.2cqw 1.4cqw}
  .trow{display:flex;justify-content:space-between;align-items:baseline;font-size:1.6cqw}
  .trow .tn{font-weight:700;color:#fff}
  .trow .tv{font-size:1.4cqw;color:var(--muted)}
  .trow .tv.done{color:var(--done);font-weight:800}
  .bar{height:1.1cqw;background:var(--track);border-radius:1cqw;overflow:hidden;margin-top:.7cqw}
  .bar>i{display:block;height:100%;width:0;background:var(--grad);border-radius:1cqw;transition:width .5s}
  .bar>i.done{background:linear-gradient(90deg,#3aa869,var(--done))}
  .empty{color:var(--muted);font-size:1.5cqw;padding:1.4cqw 0}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="top">
      <div class="heart">💞</div>
      <div class="who"><div class="k">You belong to</div><div class="n" id="owner">—</div></div>
      <div class="close" id="closeBtn">✕ Close</div>
    </div>
    <div class="sub">Tasks from your Owner</div>
    <div class="tasks" id="tasks"></div>
  </div>
</div>
<script>
"use strict";
var DESIGN_W = 1000, gEp = "";
var LABEL = { serve:"Please your Owner", breed:"Let them breed you" };

function fitHud(){ var w=document.querySelector(".wrap"); if(!w) return;
  w.style.transform = "scale(" + (innerWidth/DESIGN_W) + "," + (innerHeight/(w.offsetHeight||600)) + ")"; }
window.addEventListener("resize", fitHud); window.addEventListener("load", fitHud);
(function(){ var e=document.querySelector(".wrap"); if(window.ResizeObserver&&e) new ResizeObserver(fitHud).observe(e); })();

function esc(s){ return (s==null?"":String(s)).replace(/[&<>]/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c]; }); }

function render(d){
  if (d.ep) gEp = d.ep;
  document.getElementById("owner").textContent = d.ow || "—";
  var host = document.getElementById("tasks");
  var raw = (d.tk||"").split(";").filter(function(s){ return s.length>0; });
  if (!raw.length){ host.innerHTML = '<div class="empty">No tasks set yet. Your Owner decides your duties.</div>'; fitHud(); return; }
  var html = "";
  raw.forEach(function(t){
    var p = t.split(":");                       // type:count:progress:done
    var type=p[0], cnt=+p[1]||1, prog=+p[2]||0, done=(+p[3]===1);
    var lbl = LABEL[type] || type;
    var pctv = Math.min(100, prog/cnt*100);
    html += '<div class="task"><div class="trow"><span class="tn">'+esc(lbl)+'</span>'
          + '<span class="tv'+(done?' done':'')+'">'+(done?'✓ DONE':(prog+' / '+cnt))+'</span></div>'
          + '<div class="bar"><i class="'+(done?'done':'')+'" style="width:'+pctv+'%"></i></div></div>';
  });
  host.innerHTML = html;
  fitHud();
}

function loadHash(){ var h=location.hash.slice(1); if(!h) return;
  try{ render(JSON.parse(decodeURIComponent(h))); }catch(e){} }
window.addEventListener("hashchange", loadHash);
document.getElementById("closeBtn").addEventListener("click", function(){
  if (gEp) { try { fetch(gEp + "?own=0", { mode:"no-cors" }); } catch(e){} }
});
loadHash();
fitHud();
</script>
</body>
</html>
