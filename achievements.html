<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Corruption — Achievements</title>
<style>
  :root{
    --bg:#070710; --panel:#0d0d18; --panel2:#10101e;
    --stroke:rgba(140,110,210,0.18); --stroke2:rgba(140,110,210,0.30);
    --pur:#9a6cff; --pur-bright:#b98cff; --txt:#e9e6f5; --muted:#7d7a93; --gold:#ffce63;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden}
  body{background:var(--bg);font-family:"Segoe UI",Roboto,Arial,sans-serif;color:var(--txt)}
  .wrap{position:absolute;top:0;left:0;width:760px;transform-origin:0 0;container-type:inline-size;
    padding:2.2cqw;background:var(--bg);display:flex;flex-direction:column;min-height:100cqw}
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.8cqw}
  .ttl{font-size:2.6cqw;font-weight:800;letter-spacing:.2cqw;
    background:linear-gradient(90deg,var(--pur),var(--pur-bright));-webkit-background-clip:text;
    background-clip:text;color:transparent}
  .count{font-size:1.6cqw;color:var(--muted);letter-spacing:.12cqw}
  .close{cursor:pointer;width:4cqw;height:4cqw;border-radius:50%;border:1px solid var(--stroke2);
    display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:2.4cqw;line-height:1}
  .close:hover{color:#fff;border-color:var(--pur)}
  .list{display:flex;flex-direction:column;gap:1.4cqw}
  .ach{display:flex;gap:2cqw;align-items:center;background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--stroke);border-radius:1.4cqw;padding:1.8cqw 2cqw;opacity:.45;transition:opacity .3s}
  .ach.on{opacity:1;border-color:var(--stroke2)}
  .ico{font-size:4.4cqw;line-height:1;filter:grayscale(1)}
  .ach.on .ico{filter:none}
  .meta{flex:1;min-width:0}
  .nm{font-size:2.2cqw;font-weight:800;color:#fff}
  .ach.on .nm{color:var(--pur-bright)}
  .ds{font-size:1.5cqw;color:var(--muted);margin-top:.4cqw;line-height:1.25}
  .badge{font-size:1.3cqw;letter-spacing:.14cqw;text-transform:uppercase;font-weight:700;
    color:var(--muted);white-space:nowrap}
  .ach.on .badge{color:var(--gold)}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="ttl">Achievements</div>
    <div class="count" id="count">0 / 8</div>
    <div class="close" id="close">&times;</div>
  </div>
  <div class="list" id="list"></div>
</div>

<script>
"use strict";
// bit must match inm_monitor's achFlags
var ACHS = [
  {bit:1,   ico:"💦", nm:"First Creampie",  ds:"Get bred at least once — take a creampie."},
  {bit:2,   ico:"🕳️", nm:"All Holes Used",  ds:"Take a load in pussy, ass and throat in a single session."},
  {bit:4,   ico:"👁", nm:"Exhibitionist",   ds:"Get used with 5 or more people watching nearby."},
  {bit:8,   ico:"🏆", nm:"Town Toy",        ds:"Be used by 25 different partners (lifetime)."},
  {bit:16,  ico:"⭐", nm:"Head to Toe",      ds:"Get messy in all five zones (face, pussy, ass, chest, body) in one session."},
  {bit:32,  ico:"😈", nm:"First Prestige",   ds:"Prestige for the first time — reborn filthier."},
  {bit:64,  ico:"🔥", nm:"Prestige V",       ds:"Reach prestige rank V."},
  {bit:128, ico:"👑", nm:"Max Prestige",     ds:"Reach maximum prestige (rank X)."},
  {bit:256,  ico:"👥", nm:"Gangbang",      ds:"Milestone — used by 3 different partners in one session. +1000 XP."},
  {bit:512,  ico:"🌊", nm:"Soaked",        ds:"Milestone — take 12 loads in a single session. +1200 XP."},
  {bit:1024, ico:"📣", nm:"Local Legend",  ds:"Milestone — reach 200 notoriety from witnessed public acts. +1500 XP."}
];

var DESIGN_W = 760, gEp = "";
function fit(){ var w=document.querySelector(".wrap"); if(!w) return;
  w.style.transform = "scale(" + (innerWidth/DESIGN_W) + "," + (innerHeight/(w.offsetHeight||1000)) + ")"; }
window.addEventListener("resize", fit);
window.addEventListener("load", fit);
(function(){ var e=document.querySelector(".wrap"); if(window.ResizeObserver&&e) new ResizeObserver(fit).observe(e); })();

function build(){
  var h="", i;
  for(i=0;i<ACHS.length;i++){ var a=ACHS[i];
    h+='<div class="ach" id="a'+a.bit+'"><div class="ico">'+a.ico+'</div>'
     + '<div class="meta"><div class="nm">'+a.nm+'</div><div class="ds">'+a.ds+'</div></div>'
     + '<div class="badge" id="b'+a.bit+'">Locked</div></div>';
  }
  document.getElementById("list").innerHTML=h;
}
build();

function render(d){
  if (d.ep) gEp = d.ep;
  var ac = +d.ac||0, got=0, i;
  for(i=0;i<ACHS.length;i++){ var a=ACHS[i], on=(ac&a.bit)!==0; if(on)got++;
    document.getElementById("a"+a.bit).classList.toggle("on", on);
    document.getElementById("b"+a.bit).textContent = on ? "Unlocked" : "Locked";
  }
  document.getElementById("count").textContent = got+" / "+ACHS.length;
  fit();
}

function loadHash(){ var h=location.hash.slice(1); if(!h) return;
  try{ render(JSON.parse(decodeURIComponent(h))); }catch(e){} }
window.addEventListener("hashchange", loadHash);

document.getElementById("close").addEventListener("click", function(){
  if (gEp) { try { fetch(gEp + "?ach=0", { mode:"no-cors" }); } catch(e){} }
});

loadHash();
fit();
</script>
</body>
</html>
